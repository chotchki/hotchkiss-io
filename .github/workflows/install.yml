name: Install

# Fires when a release is un-drafted (the `published` release event
# also fires on draft → published transitions). Runs on the
# self-hosted runner that lives on Chris's server, downloads the
# .pkg from the just-published release, and installs it system-wide
# via `installer -target /` (requires sudo).
#
# Manual `workflow_dispatch` is provided for re-running an install
# without re-publishing the release; supply the tag explicitly.
#
# Pairs with `release.yml`: that workflow builds + signs + notarizes
# on a GitHub-hosted macos-14 runner and creates a draft release.
# When you un-draft via `gh release edit <tag> --draft=false` (or
# the GH UI), this workflow takes over.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to install (e.g. v0.0.43)'
        required: true

jobs:
  install:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      # `inputs.tag` is empty on the release event; `github.event.release.tag_name`
      # is empty on workflow_dispatch. The truthy-OR picks whichever fired.
      - name: Download .pkg from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern '*.pkg' \
            --clobber

      - name: Install .pkg
        # NOTE: `secrets.KEYCHAIN` is a misnomer — under the old
        # self-hosted build pipeline it doubled as the keychain
        # unlock password, but here it's only used as the sudo
        # password on the install runner. Rename to `SUDO_PASSWORD`
        # later for clarity.
        env:
          SUDO_PASSWORD: ${{ secrets.KEYCHAIN }}
        run: |
          set -euo pipefail
          # `find` instead of glob+ls: with `set -o pipefail` an
          # unmatched glob would kill the pipeline before the empty
          # check could run. find returns 0 with empty output instead.
          PKG=$(find . -maxdepth 1 -name 'hotchkiss-io-*.pkg' -type f | head -n1)
          if [[ -z "$PKG" ]]; then
            echo "no .pkg found after download" >&2
            exit 1
          fi
          echo "$SUDO_PASSWORD" | sudo -S installer -pkg "$PKG" -target /
